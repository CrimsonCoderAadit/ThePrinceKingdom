    const templateEl = document.querySelector('script[type="__bundler/template"]');

        const bytes = new Uint8Array(binaryStr.length);

      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

    }

    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };

      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {

        // parent.location.hash change), nudge the iframe.

.createRef();\n    this.soundLabelRef = React.createRef();\n    this.flashRef = React.createRef();\n    this.nameRef = React.createRef();\n    this.aliasRef = React.createRef();\n    this.empireRef = React.createRef();\n    this.republicRef = React.createRef();\n    this.quoteRef = React.createRef();\n    this.cubeRef = React.createRef();\n    this.nameClicks = 0;\n    this.aliasShown = false;\n  }\n\n  renderVals(){\n    return {\n      rootRef: this.rootRef, bgCanvasRef: this.bgCanvasRef, fxCanvasRef: this.fxCanvasRef,\n      cursorRef: this.cursorRef, ringRef: this.ringRef, meterDotRef: this.meterDotRef,\n      meterLabelRef: this.meterLabelRef, soundBtnRef: this.soundBtnRef, soundDotRef: this.soundDotRef,\n      soundLabelRef: this.soundLabelRef, flashRef: this.flashRef, nameRef: this.nameRef, aliasRef: this.aliasRef,\n      empireRef: this.empireRef, republicRef: this.republicRef, quoteRef: this.quoteRef,\n      cubeRef: this.cubeRef, toggleHolocron: this.toggleHolocron, scrollTop: this.scrollTop,\n      toggleSound: this.toggleSound, onNameClick: this.onNameClick,\n    };\n  }\n\n  componentDidMount(){\n    const root = this.rootRef.current;\n    if(!root) return;\n    this.reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.touch = window.matchMedia('(hover: none), (pointer: coarse)').matches;\n\n    // ---- palette: CONSTANT deep-space bg + CONSTANT near-white text. Only the accent sweeps red→purple→white→blue across mouse X ----\n    const BLUE=[59,175,255], WHITE=[238,242,250], PURPLE=[168,74,196], RED=[200,16,46];\n    const lerp=(a,b,f)=>a+(b-a)*f;\n    const lerpC=(c1,c2,f)=>[lerp(c1[0],c2[0],f),lerp(c1[1],c2[1],f),lerp(c1[2],c2[2],f)];\n    const rgb=c=>`rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;\n    const rgba=(c,a)=>`rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;\n    // t=0 (far left/Light)=blue → 0.5 (center)=white → 0.75=purple → 1 (far right/Sith)=red\n    const accentAt=(t)=>{\n      if(t<0.5) return lerpC(BLUE,WHITE,t/0.5);\n      if(t<0.75) return lerpC(WHITE,PURPLE,(t-0.5)/0.25);\n      return lerpC(PURPLE,RED,(t-0.75)/0.25);\n    };\n\n    // ---- state ----\n    this.targetT = this.touch ? 0.82 : 0.82;   // crimson-forward default\n    this.curT = this.touch ? 0.5 : 0.5;\n    this.mx = window.innerWidth*0.82; this.my = window.innerHeight*0.4;\n    this.cx = this.mx; this.cy = this.my; // cursor lag\n    this.rx = this.mx; this.ry = this.my; // ring lag\n    this.lockUntil = 0;\n    this.lightningUntil = 0; this.lightningStrong = false;\n    this.trail = [];\n    this.quotes = {\n      jedi: ['In the quiet between breaths, the Force speaks.', 'Patience, padawan — the long road is the only road.', 'Serenity is the stillness held within the storm.'],\n      grey: ['Between light and shadow lies the truer path.', 'Two suns, one horizon — balance is chosen, never given.', 'I am the dusk: neither dawn nor dark, yet both.'],\n      sith: ['Power answers only to those bold enough to seize it.', 'Through ambition, every chain is broken.', 'Fear sharpens the blade that carves the way.']\n    };\n    this.qZone=''; this.qIdx=0; this.qNext=0;\n    this.lastMove=performance.now(); this.idle=false; this.push=null;\n    this.hyperUntil=0; this.vaderUntil=0; this.override=null; this.yoda=false; this.holoState=null; this.holoRot=0;\n    this.dimEl=root.querySelector('[data-dim]');\n\n    const applyColors=(t)=>{\n      const ac = accentAt(t);\n      const a2 = lerpC(ac, WHITE, 0.4);\n      const intensity = Math.abs(t-0.5)*2; // 0 at white center, 1 at red/blue extremes\n      const st = root.style;\n      st.setProperty('--bg', 'rgb(7,5,8)');                 // constant deep space\n      st.setProperty('--accent', rgb(ac));\n      st.setProperty('--accent2', rgb(a2));\n      st.setProperty('--text', 'rgb(244,239,240)');         // constant near-white, always legible\n      st.setProperty('--dim', 'rgba(244,239,240,.62)');\n      st.setProperty('--particle', rgb(ac));\n      st.setProperty('--line', rgba(ac, 0.2 + intensity*0.12));\n      st.setProperty('--glow', `0 0 ${8+intensity*16}px ${rgba(ac, 0.22 + intensity*0.42)}`);\n      st.setProperty('--card', 'rgba(255,255,255,.03)');\n      this._cur = { ac, a2, intensity, t };\n      // faction emblems cross-fade (hidden near white center)\n      if(this.empireRef.current)   this.empireRef.current.style.opacity   = Math.max(0,(t-0.6)/0.4)*0.14;\n      if(this.republicRef.current) this.republicRef.current.style.opacity = Math.max(0,(0.4-t)/0.4)*0.14;\n    };\n    applyColors(this.curT);\n\n    // ---- canvases ----\n    const bg = this.bgCanvasRef.current, bgx = bg.getContext('2d');\n    const fx = this.fxCanvasRef.current, fxx = fx.getContext('2d');\n    let W,H,DPR;\n    const resize=()=>{\n      DPR = Math.min(window.devicePixelRatio||1, 2);\n      W = window.innerWidth; H = window.innerHeight;\n      [bg,fx].forEach(c=>{ c.width=W*DPR; c.height=H*DPR; });\n      bgx.setTransform(DPR,0,0,DPR,0,0); fxx.setTransform(DPR,0,0,DPR,0,0);\n    };\n    resize();\n    window.addEventListener('resize', resize);\n\n    // stars\n    const STARN = this.touch? 90 : 170;\n    this.stars = [];\n    for(let i=0;i<STARN;i++){\n      this.stars.push({ x:Math.random(), y:Math.random(), z:Math.random()*0.85+0.15, tw:Math.random()*Math.PI*2, sp:Math.random()*0.0006+0.0001 });\n    }\n\n    const drawBg=(now)=>{\n      bgx.clearRect(0,0,W,H);\n      const s=this._cur;\n      const ox = (this.cx - W/2);\n      const oy = (this.cy - H/2);\n      const hyper = (now < this.hyperUntil && !this.reduce) ? (this.hyperUntil-now)/1100 : 0; // 1 -> 0\n      const idleP = (this.idle && !this.reduce) ? (0.55 + 0.45*Math.sin(now*0.0015)) : 1;       // breathing\n      const push = this.push;\n      const cxp = W/2, cyp = H/2;\n      for(const st of this.stars){\n        let x = st.x*W - (ox*0.012*st.z*3);\n        let y = st.y*H - (oy*0.012*st.z*3);\n        if(push){\n          const age=(now-push.t0)/900;\n          if(age<1){ const dx=x-push.x, dy=y-push.y, d=Math.hypot(dx,dy)||1; const f=(1-age)*140*st.z; x+=dx/d*f; y+=dy/d*f; }\n        }\n        x = ((x%W)+W)%W; y = ((y%H)+H)%H;\n        st.tw += st.sp* (this.reduce?0:16);\n        const tw = 0.55 + Math.sin(st.tw)*0.45;\n        const size = st.z*1.8 + 0.3;\n        const a = (0.18+st.z*0.55)*tw*idleP;\n        if(hyper>0){\n          const len = hyper*hyper*300*st.z;\n          const ang = Math.atan2(y-cyp, x-cxp);\n          bgx.beginPath();\n          bgx.strokeStyle = `rgba(${s.ac[0]|0},${s.ac[1]|0},${s.ac[2]|0},${a})`;\n          bgx.lineWidth = size; bgx.lineCap='round';\n          bgx.moveTo(x,y); bgx.lineTo(x+Math.cos(ang)*len, y+Math.sin(ang)*len); bgx.stroke();\n        } else {\n          bgx.beginPath();\n          bgx.arc(x,y,size,0,Math.PI*2);\n          bgx.fillStyle = `rgba(${s.ac[0]|0},${s.ac[1]|0},${s.ac[2]|0},${a})`;\n          bgx.fill();\n        }\n      }\n      if(push && (now-push.t0)>900) this.push=null;\n    };\n\n    // lightning bolt\n    const bolt=(ctx,x1,y1,x2,y2,disp,col,wid)=>{\n      if(disp<6){ ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.strokeStyle=col; ctx.lineWidth=wid; ctx.stroke(); return; }\n      const mx=(x1+x2)/2 + (Math.random()-0.5)*disp;\n      const my=(y1+y2)/2 + (Math.random()-0.5)*disp;\n      bolt(ctx,x1,y1,mx,my,disp/2,col,wid);\n      bolt(ctx,mx,my,x2,y2,disp/2,col,wid);\n    };\n\n    const drawFx=(now)=>{\n      fxx.clearRect(0,0,W,H);\n      const s=this._cur;\n      // cursor trail\n      if(!this.touch && this.trail.length>1){\n        for(let i=1;i<this.trail.length;i++){\n          const p0=this.trail[i-1], p1=this.trail[i];\n          const a=(i/this.trail.length);\n          fxx.beginPath(); fxx.moveTo(p0.x,p0.y); fxx.lineTo(p1.x,p1.y);\n          fxx.strokeStyle=`rgba(${s.ac[0]|0},${s.ac[1]|0},${s.ac[2]|0},${a*0.5})`;\n          fxx.lineWidth=a*3.4; fxx.lineCap='round';\n          fxx.shadowBlur=12; fxx.shadowColor=`rgb(${s.ac[0]|0},${s.ac[1]|0},${s.ac[2]|0})`;\n          fxx.stroke();\n        }\n        fxx.shadowBlur=0;\n      }\n      // lightning\n      const strong = now < this.lightningUntil;\n      const ambient = (this.curT>0.72) && !this.reduce && Math.random()<0.022;\n      if((strong || ambient) && !this.reduce){\n        const col = `rgba(${s.a2[0]|0},${s.a2[1]|0},${s.a2[2]|0},${strong?0.9:0.5})`;\n        const n = strong?3:1;\n        for(let k=0;k<n;k++){\n          const x1=Math.random()*W, y1=0;\n          const x2=Math.random()*W, y2=H;\n          fxx.shadowBlur=18; fxx.shadowColor=col;\n          bolt(fxx,x1,y1,x2,y2,strong?260:160,col,strong?2.2:1.2);\n        }\n        fxx.shadowBlur=0;\n      }\n    };\n\n    let lastFlash=0;\n    const loop=(now)=>{\n      // ease alignment (cursor, with holocron / vader overrides)\n      const locked = now < this.lockUntil;\n      let tgt = this.targetT;\n      if(this.override) tgt = this.override==='sith' ? 1 : 0;\n      else if(now < this.vaderUntil) tgt = 1;\n      this.curT += (tgt - this.curT) * (locked ? 0.18 : (this.override ? 0.12 : 0.09));\n      this.idle = !this.reduce && (now - this.lastMove) > 15000;\n      applyColors(this.curT);\n      // rotating alignment quote\n      const qz = this.curT<0.4?'jedi':this.curT>0.6?'sith':'grey';\n      if(qz!==this.qZone || now>this.qNext){\n        if(qz!==this.qZone){ this.qZone=qz; this.qIdx=0; } else { this.qIdx=(this.qIdx+1)%this.quotes[qz].length; }\n        this.qNext=now+6500;\n        const qel=this.quoteRef.current;\n        if(qel){ let txt=this.quotes[qz][this.qIdx]; if(this.yoda){ txt=txt.replace(/\\./g,'').split(' ').filter(Boolean).reverse().join(' ')+'.'; this.yoda=false; } qel.style.opacity='0'; setTimeout(()=>{ if(this.quoteRef.current){ this.quoteRef.current.textContent=txt; this.quoteRef.current.style.opacity='0.82'; } },220); }\n      }\n      // cursor lag (subtle lightsaber cursor only — no tracker ring)\n      this.cx += (this.mx-this.cx)*0.35; this.cy += (this.my-this.cy)*0.35;\n      if(!this.touch && this.cursorRef.current){ this.cursorRef.current.style.transform=`translate(${this.cx}px,${this.cy}px)`; }\n      drawBg(now);\n      drawFx(now);\n      this._raf = requestAnimationFrame(loop);\n    };\n\n    if(this.reduce){\n      // static render once; still update colors on move\n      drawBg(performance.now()); applyColors(this.curT);\n    }\n    this._raf = requestAnimationFrame(loop);\n\n    // ---- pointer ----\n    const onMove=(e)=>{\n      this.mx=e.clientX; this.my=e.clientY;\n      this.lastMove=performance.now();\n      this.targetT = Math.max(0, Math.min(1, e.clientX/window.innerWidth));\n      if(!this.touch){\n        if(this.cursorRef.current) this.cursorRef.current.style.opacity='1';\n        this.trail.push({x:e.clientX,y:e.clientY});\n        if(this.trail.length>16) this.trail.shift();\n      }\n      // magnetic\n      for(const b of this._mag){\n        const r=b.getBoundingClientRect();\n        const bx=r.left+r.width/2, by=r.top+r.height/2;\n        const dx=e.clientX-bx, dy=e.clientY-by;\n        const dist=Math.hypot(dx,dy);\n        if(dist<120){ b.style.transform=`translate(${dx*0.28}px,${dy*0.28}px)`; }\n        else { b.style.transform='translate(0,0)'; }\n      }\n    };\n    window.addEventListener('mousemove', onMove, {passive:true});\n    if(this.touch){\n      window.addEventListener('touchmove',(e)=>{ if(e.touches[0]){ this.targetT=Math.max(0,Math.min(1,e.touches[0].clientX/window.innerWidth)); } },{passive:true});\n    }\n\n    // hide cursor when leaving window\n    window.addEventListener('mouseout',()=>{ if(this.cursorRef.current)this.cursorRef.current.style.opacity='0'; });\n    if(!this.touch) root.style.cursor='none';\n\n    // magnetic + hover sfx\n    this._mag = Array.from(root.querySelectorAll('[data-magnetic]'));\n    this._mag.forEach(b=>{\n      b.addEventListener('mouseenter',()=>{ this.blip(); });\n    });\n\n    // ---- 3D tilt ----\n    if(!this.touch && !this.reduce){\n      root.querySelectorAll('[data-tilt]').forEach(card=>{\n        card.style.transition='transform .15s ease';\n        card.addEventListener('mousemove',(e)=>{\n          const r=card.getBoundingClientRect();\n          const px=(e.clientX-r.left)/r.width-0.5;\n          const py=(e.clientY-r.top)/r.height-0.5;\n          card.style.transform=`perspective(800px) rotateY(${px*9}deg) rotateX(${-py*9}deg) translateZ(6px)`;\n          card.style.boxShadow=`0 18px 40px rgba(0,0,0,.4), ${ -px*16 }px ${ -py*16 }px 30px var(--glow)`;\n        });\n        card.addEventListener('mouseleave',()=>{ card.style.transform='perspective(800px) rotateY(0) rotateX(0)'; card.style.boxShadow='none'; });\n      });\n    }\n\n    // ---- reveals + saber ignite ----\n    const revealEls = root.querySelectorAll('[data-reveal]');\n    revealEls.forEach(el=>{ if(!this.reduce){ el.style.opacity='0'; el.style.transform='translateY(28px)'; el.style.transition='opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)'; } });\n    const sabers = root.querySelectorAll('[data-saber]');\n    sabers.forEach(el=>{ el.style.transition='width .7s cubic-bezier(.3,.9,.3,1), opacity .4s'; el.style.opacity='0'; });\n    if('IntersectionObserver' in window && !this.reduce){\n      const io=new IntersectionObserver((ents)=>{\n        ents.forEach(ent=>{\n          if(ent.isIntersecting){\n            const el=ent.target;\n            if(el.hasAttribute('data-saber')){ el.style.opacity='1'; el.style.width='100%'; this.clash(0.12); }\n            else { el.style.opacity='1'; el.style.transform='translateY(0)'; }\n            io.unobserve(el);\n          }\n        });\n      },{threshold:0.14});\n      revealEls.forEach(el=>io.observe(el));\n      sabers.forEach(el=>io.observe(el));\n    } else {\n      revealEls.forEach(el=>{ el.style.opacity='1'; el.style.transform='none'; });\n      sabers.forEach(el=>{ el.style.opacity='1'; el.style.width='100%'; });\n    }\n\n    // ---- scramble hero ----\n    const nameEl=this.nameRef.current;\n    if(nameEl){\n      const finalTxt = nameEl.getAttribute('data-final')||nameEl.textContent;\n      if(this.reduce){ nameEl.textContent=finalTxt; }\n      else { this.scramble(nameEl, finalTxt, 1100); }\n    }\n\n    // ---- placeholder buttons ----\n    root.querySelectorAll('[data-placeholder]').forEach(p=>{\n      p.addEventListener('click',(e)=>{ e.preventDefault(); this.clash(0.3);\n        const orig=p.textContent; p.textContent='⚠ replace href in source'; p.style.borderStyle='solid';\n        setTimeout(()=>{ p.textContent=orig; p.style.borderStyle='dashed'; },1100);\n      });\n    });\n\n    // ---- easter eggs ----\n    this.setupKonami();\n    this.setupTyping();\n    this.consoleEgg();\n\n    // heading lightsaber underline (ignites L→R on hover, color = current alignment)\n    root.querySelectorAll('main h2, main h3').forEach(h=>{\n      const blade=document.createElement('span');\n      blade.style.cssText='position:absolute; left:0; bottom:-7px; height:3px; width:0; background:var(--accent); box-shadow:var(--glow); border-radius:2px; transition:width .35s cubic-bezier(.3,.9,.3,1); pointer-events:none;';\n      if(getComputedStyle(h).position==='static') h.style.position='relative';\n      h.appendChild(blade);\n      h.addEventListener('mouseenter',()=>{ if(!this.reduce) blade.style.width='100%'; this.clash(0.07); });\n      h.addEventListener('mouseleave',()=>{ blade.style.width='0'; });\n    });\n\n    // double-click anywhere → Force push (stars scatter outward, then drift back)\n    window.addEventListener('dblclick',(e)=>{ this.lastMove=performance.now(); if(!this.reduce){ this.push={x:e.clientX,y:e.clientY,t0:performance.now()}; } this.clash(0.18); });\n\n    // \"these aren't the droids\" footer hotspot\n    const dDot=root.querySelector('[data-droid-dot]'), dTip=root.querySelector('[data-droid-tip]');\n    if(dDot&&dTip){\n      const show=()=>{ dTip.style.opacity='1'; dTip.style.filter='blur(0px)'; dTip.style.transform='translateY(0)'; };\n      const hide=()=>{ dTip.style.opacity='0'; dTip.style.filter='blur(2px)'; dTip.style.transform='translateY(4px)'; };\n      dDot.addEventListener('mouseenter',show); dDot.addEventListener('mouseleave',hide);\n      dDot.addEventListener('focus',show); dDot.addEventListener('blur',hide);\n    }\n  }\n\n  // ===== effects =====\n  scramble(el, text, dur){\n    const chars='!<>-_\\\\/[]{}—=+*^?#________ABCDEFGHJKLMNPRSTUVWXYZ0123456789';\n    const start=performance.now();\n    const orig=text.split('');\n    const reveal=new Array(orig.length).fill(false);\n    const order=orig.map((_,i)=>i).sort(()=>Math.random()-0.5);\n    const tick=(now)=>{\n      const p=Math.min(1,(now-start)/dur);\n      const cut=Math.floor(p*orig.length);\n      for(let k=0;k<cut;k++) reveal[order[k]]=true;\n      let out='';\n      for(let i=0;i<orig.length;i++){\n        if(orig[i]===' '){ out+=' '; continue; }\n        out += reveal[i]? orig[i] : `<span style=\"color:var(--accent);opacity:.8\">${chars[Math.floor(Math.random()*chars.length)]}<\u002Fspan>`;\n      }\n      el.innerHTML=out;\n      if(p<1) requestAnimationFrame(tick); else el.textContent=text;\n    };\n    requestAnimationFrame(tick);\n  }\n\n  onNameClick=()=>{\n    this.blip();\n    this.nameClicks++;\n    if(this.nameClicks>=5 && !this.aliasShown){\n      this.aliasShown=true;\n      const a=this.aliasRef.current;\n      if(a){\n        a.style.transition='transform .6s cubic-bezier(.2,.8,.2,1), text-shadow .6s';\n        a.style.transform='scale(1.18)';\n        a.innerHTML='<span style=\"font-style:italic\">⚜ Le Prince Écarlate ⚜<\u002Fspan>';\n        a.style.textShadow='0 0 28px var(--accent), 0 0 50px var(--accent)';\n        this.triggerLightning(true);\n        this.clash(0.5);\n        setTimeout(()=>{ a.style.transform='scale(1)'; },700);\n      }\n    }\n  };\n\n  triggerLightning(strong){\n    this.lightningUntil = performance.now() + (strong?800:450);\n    const f=this.flashRef.current;\n    if(f && !this.reduce){ f.style.opacity= strong? '0.9':'0.5'; setTimeout(()=>{ f.style.opacity='0'; }, strong?260:180); }\n  }\n\n  forceDark(){\n    this.targetT=1; this.lockUntil=performance.now()+1700;\n    this.triggerLightning(true);\n    this.clash(0.6);\n  }\n\n  setupKonami(){\n    const seq=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];\n    let idx=0;\n    window.addEventListener('keydown',(e)=>{\n      const k=e.key.length===1? e.key.toLowerCase(): e.key;\n      if(k===seq[idx]){ idx++; if(idx===seq.length){ idx=0; this.forceDark(); } }\n      else idx = (k===seq[0])?1:0;\n    });\n  }\n\n  setupTyping(){\n    let buf='';\n    window.addEventListener('keydown',(e)=>{\n      if(e.key.length!==1) return;\n      buf=(buf+e.key.toLowerCase()).slice(-8);\n      if(buf.endsWith('crimson')){ this.triggerLightning(true); this.clash(0.45); }\n      if(buf.endsWith('vader')){ this.vaderEffect(); }\n      if(buf.endsWith('yoda')){ this.yoda=true; this.qNext=0; }\n    });\n  }\n\n  consoleEgg(){\n    const c='color:#C8102E;font-weight:bold;font-size:13px;font-family:monospace';\n    const d='color:#888;font-family:monospace';\n    console.log('%c⚔  YOU OPENED THE HOLOCRON.', c);\n    console.log('%cWelcome, fellow traveler of DevTools. I do CTFs too — so here is a crumb:', d);\n    console.log('%c   flag{the_force_aligns_with_those_who_read_source}', 'color:#3BAFFF;font-family:monospace;font-size:12px');\n    console.log('%c   01000011 01110010 01101001 01101101 01110011 01101111 01101110', d);\n    console.log('%c— Aadit / Crimson · github.com/CrimsonCoderAadit', 'color:#C8102E;font-family:monospace');\n  }\n\n  vaderEffect(){\n    this.vaderUntil = performance.now()+5000;\n    if(this.dimEl && !this.reduce){ this.dimEl.style.opacity='0.55'; setTimeout(()=>{ if(this.dimEl) this.dimEl.style.opacity='0'; },4500); }\n    this.vaderBreath();\n  }\n  vaderBreath(){\n    if(!this.state.soundOn || !this.actx) return;\n    const ac=this.actx, t0=ac.currentTime, dur=4;\n    const buf=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);\n    const d=buf.getChannelData(0);\n    for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;\n    const src=ac.createBufferSource(); src.buffer=buf;\n    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=480;\n    const g=ac.createGain(); g.gain.value=0.0001;\n    src.connect(lp); lp.connect(g); g.connect(this.master);\n    const breath=(t)=>{ g.gain.setValueAtTime(0.0001,t0+t); g.gain.exponentialRampToValueAtTime(0.22,t0+t+0.5); g.gain.exponentialRampToValueAtTime(0.0001,t0+t+1.5); };\n    breath(0); breath(2);\n    src.start(t0); src.stop(t0+dur);\n  }\n  toggleHolocron=()=>{\n    this.blip();\n    this.holoState = this.holoState==null ? 'sith' : this.holoState==='sith' ? 'jedi' : null;\n    this.override = this.holoState;\n    this.holoRot = (this.holoRot||0) + 180;\n    if(this.cubeRef.current) this.cubeRef.current.style.transform=`rotateY(${this.holoRot}deg)`;\n    if(this.holoState==='sith') this.triggerLightning(true); else this.clash(0.12);\n  };\n  scrollTop=()=>{\n    this.hyperUntil = performance.now()+1100;\n    this.clash(0.12);\n    window.scrollTo({ top:0, behavior: this.reduce?'auto':'smooth' });\n  };\n\n  // ===== audio =====\n  ensureAudio(){\n    if(this.actx) return;\n    try{\n      const AC = window.AudioContext||window.webkitAudioContext;\n      this.actx=new AC();\n      this.master=this.actx.createGain(); this.master.gain.value=0.0; this.master.connect(this.actx.destination);\n    }catch(e){ this.actx=null; }\n  }\n  startHum(){\n    if(!this.actx) return;\n    if(this.hum) return;\n    const ac=this.actx;\n    const g=ac.createGain(); g.gain.value=0.0; g.connect(this.master);\n    const lp=ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.connect(g);\n    const o1=ac.createOscillator(); o1.type='sawtooth'; o1.frequency.value=68;\n    const o2=ac.createOscillator(); o2.type='sine'; o2.frequency.value=110;\n    o1.connect(lp); o2.connect(lp);\n    const lfo=ac.createOscillator(); lfo.frequency.value=5.5; const lg=ac.createGain(); lg.gain.value=8; lfo.connect(lg); lg.connect(o1.frequency);\n    o1.start(); o2.start(); lfo.start();\n    g.gain.linearRampToValueAtTime(0.16, ac.currentTime+0.4);\n    this.hum={o1,o2,lfo,g};\n    this.master.gain.linearRampToValueAtTime(0.9, ac.currentTime+0.3);\n  }\n  stopHum(){\n    if(this.hum&&this.actx){ const ac=this.actx; this.hum.g.gain.linearRampToValueAtTime(0,ac.currentTime+0.25);\n      const h=this.hum; setTimeout(()=>{ try{h.o1.stop();h.o2.stop();h.lfo.stop();}catch(e){} },300); this.hum=null; }\n  }\n  clash(vol){\n    if(!this.state.soundOn||!this.actx) return;\n    const ac=this.actx; const dur=0.18;\n    const buf=ac.createBuffer(1, ac.sampleRate*dur, ac.sampleRate);\n    const d=buf.getChannelData(0);\n    for(let i=0;i<d.length;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); }\n    const src=ac.createBufferSource(); src.buffer=buf;\n    const bp=ac.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1600; bp.Q.value=0.8;\n    const g=ac.createGain(); g.gain.value=(vol||0.3)*0.7;\n    src.connect(bp); bp.connect(g); g.connect(this.master); src.start();\n  }\n  blip(){\n    if(!this.state.soundOn||!this.actx) return;\n    const ac=this.actx; const o=ac.createOscillator(); const g=ac.createGain();\n    o.type='sine'; o.frequency.value=520; g.gain.value=0.0; o.connect(g); g.connect(this.master);\n    g.gain.linearRampToValueAtTime(0.05, ac.currentTime+0.01); g.gain.linearRampToValueAtTime(0, ac.currentTime+0.12);\n    o.start(); o.stop(ac.currentTime+0.13);\n  }\n\n  toggleSound=()=>{\n    this.ensureAudio();\n    const next=!this.state.soundOn;\n    this.setState({soundOn:next});\n    if(next){ if(this.actx&&this.actx.state==='suspended') this.actx.resume(); this.startHum(); }\n    else { this.stopHum(); }\n    const dot=this.soundDotRef.current, lab=this.soundLabelRef.current;\n    if(dot){ dot.style.background=next?'var(--accent)':'#555'; dot.style.boxShadow=next?'0 0 10px 2px var(--accent)':'none'; }\n    if(lab){ lab.textContent=next?'SABER HUM · ON':'SABER HUM · OFF'; }\n  };\n\n  componentWillUnmount(){ if(this._raf) cancelAnimationFrame(this._raf); this.stopHum(); }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Crimson Portfolio.dc"}
